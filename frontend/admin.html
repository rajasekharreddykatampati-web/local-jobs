<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Local Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { violet: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95'} } }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen">
    <nav class="bg-violet-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="index.html" class="text-xl font-bold">Local Link Admin</a>
            <div class="text-sm font-medium space-x-4">
                <a href="index.html" class="hover:text-violet-200">View Site</a>
                <button id="logout-admin" class="hover:text-red-300">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <h1 class="text-2xl font-semibold text-gray-900 mb-6">Pending Worker Approvals</h1>

        <div class="bg-white shadow overflow-hidden sm:rounded-md border border-gray-200">
            <ul id="admin-workers-list" class="divide-y divide-gray-200">
                <li class="px-6 py-4 text-center text-gray-500">Loading...</li>
            </ul>
        </div>
    </div>

    <script type="module">
        import { fetchAdminWorkers, approveWorker, removeWorker, fetchUser } from './js/api.js';
        
        document.addEventListener("DOMContentLoaded", async () => {
            const user = await fetchUser();
            if (!user || user.role !== 'admin') {
                document.body.innerHTML = "<div class='p-10 text-center text-red-600 font-bold'>Unauthorized Access</div>";
                return;
            }
            loadAdminList();
        });

        async function loadAdminList() {
            const list = document.getElementById('admin-workers-list');
            const workers = await fetchAdminWorkers();
            
            const pending = workers.filter(w => !w.is_approved);
            
            if (pending.length === 0) {
                list.innerHTML = `<li class="px-6 py-8 text-center text-gray-500">No pending workers to approve.</li>`;
                return;
            }

            list.innerHTML = pending.map(worker => `
                <li>
                    <div class="px-4 py-4 sm:px-6 flex items-center justify-between">
                        <div class="flex flex-col">
                            <p class="text-sm font-medium text-violet-600 truncate">${worker.name} (${worker.email})</p>
                            <div class="mt-2 flex">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800 capitalize">
                                    ${worker.service_type}
                                </span>
                                <span class="ml-2 text-sm text-gray-500">${worker.location}</span>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="window.approve(${worker.id})" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-green-600 hover:bg-green-700">Approve</button>
                            <button onclick="window.reject(${worker.id})" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-red-600 hover:bg-red-700">Reject</button>
                        </div>
                    </div>
                </li>
            `).join('');
        }

        window.approve = async (id) => {
            if (confirm("Approve this worker?")) {
                await approveWorker(id);
                loadAdminList();
            }
        };

        window.reject = async (id) => {
            if (confirm("Reject and remove this worker?")) {
                await removeWorker(id);
                loadAdminList();
            }
        };

        document.getElementById('logout-admin').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
